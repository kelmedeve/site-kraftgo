backend:
  name: git-gateway
  branch: main

media_folder: "docs/assets"
public_folder: "/assets"

collections:
  - name: "pages"
    label: "Páginas"
    folder: "docs/admin"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Conteúdo", name: "body", widget: "markdown" }
